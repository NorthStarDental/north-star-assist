<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>North Star Dental Assist</title>
  <style>
    :root {
      --navy: #17315C;
      --navy-dark: #102443;
      --gold: #C89B2D;
      --gold-soft: #F5E8C8;
      --bg: #F5F7FA;
      --card-border: #E3E8F0;
      --text: #243449;
      --muted: #66758A;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .header {
      background: var(--navy);
      text-align: center;
      padding: 26px 20px 20px;
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.06);
    }

    .header img {
      width: 220px;
      max-width: 95%;
      display: block;
      margin: 0 auto;
    }

    .subhead {
      color: rgba(255,255,255,0.58);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .gold-bar {
      height: 3px;
      background: var(--gold);
      width: 100%;
    }

    .container {
      max-width: 560px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }

    .card {
      background: white;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 10px 30px rgba(23,49,92,0.08);
    }

    h2 {
      margin: 0 0 8px;
      color: var(--navy);
      font-size: 20px;
    }

    .intro {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 20px;
      font-size: 15px;
    }

    .tip {
      background: var(--gold-soft);
      border-left: 4px solid var(--gold);
      border-radius: 0 10px 10px 0;
      padding: 14px 16px;
      margin-bottom: 24px;
      color: #7a5a1a;
      font-size: 13.5px;
      line-height: 1.6;
    }

    .btn-primary {
      width: 100%;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 15px 20px;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
    }

    .btn-primary:hover { background: var(--navy-dark); }

    .btn-ghost {
      background: #eef1f6;
      color: var(--muted);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 16px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .cat-btn {
      background: white;
      border: 2px solid #dde3ef;
      border-radius: 12px;
      padding: 14px 10px;
      text-align: left;
      box-shadow: 0 2px 8px rgba(28,45,79,0.05);
      cursor: pointer;
      transition: 0.15s ease;
    }

    .cat-btn:hover {
      border-color: var(--gold);
      background: #fffaf0;
      transform: translateY(-1px);
    }

    .cat-icon {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .cat-label {
      color: var(--navy);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
    }

    .chip {
      display: inline-block;
      background: var(--gold-soft);
      border: 1px solid var(--gold);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      color: #7a5a1a;
      font-weight: 600;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      border: 2px solid #dde3ef;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text);
      resize: vertical;
      background: var(--bg);
      line-height: 1.6;
      font-family: Arial, sans-serif;
      min-height: 120px;
    }

    .section-label {
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .result-box {
      background: #fff9ed;
      border: 2px solid var(--gold);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 24px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .result-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #7A5A1A;
      margin-bottom: 5px;
    }

    .result-text {
      color: #8A5A13;
      font-size: 14px;
      line-height: 1.6;
    }

    .step {
      display: flex;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    .step-num {
      width: 26px;
      height: 26px;
      background: var(--navy);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      font-weight: 700;
    }

    .warning {
      background: #FFF5F5;
      border: 1px solid #FED7D7;
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 18px;
      color: #C53030;
      font-size: 13.5px;
      line-height: 1.6;
    }

    .footer-note {
      color: #a0aec0;
      font-size: 11px;
      margin-top: 20px;
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .header img {
        width: 190px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="ChatGPT Image Mar 31, 2026, 06_07_57 PM.png" alt="North Star Dental Assist logo" />
    <div class="subhead">Equipment Triage · Built from Real Field Experience</div>
  </div>

  <div class="gold-bar"></div>

  <div class="container">
    <div class="card" id="app"></div>
    <div class="footer-note">North Star Dental Assist · Demo Version for Internal Review</div>
  </div>

  <script>
    const categories = [
      { id: "autoclave", label: "Autoclave / Sterilizer", icon: "⚗️" },
      { id: "compressor", label: "Compressor", icon: "🔧" },
      { id: "vacuum", label: "Vacuum / Suction", icon: "💨" },
      { id: "handpiece", label: "Handpiece", icon: "🦷" },
      { id: "xray", label: "X-Ray / Imaging", icon: "📡" },
      { id: "chair", label: "Chair / Delivery Unit", icon: "🪑" },
      { id: "other", label: "Something Else", icon: "❓" }
    ];

    let state = {
      step: "welcome",
      selectedCategory: null,
      description: ""
    };

    function selectedCategoryObj() {
      return categories.find(c => c.id === state.selectedCategory);
    }

    function runTriage() {
      if (!state.description.trim()) return;
      state.step = "result";
      render();
    }

    function resetApp() {
      state = {
        step: "welcome",
        selectedCategory: null,
        description: ""
      };
      render();
    }

    function chooseCategory(id) {
      state.selectedCategory = id;
      state.step = "describe";
      render();
    }

    function renderWelcome() {
      return `
        <h2>Equipment giving you trouble?</h2>
        <div class="intro">Describe what's happening and we'll tell you if your team can likely handle it — or if it's time to call North Star.</div>
        <div class="tip">💡 Built from 35+ years of real Minnesota field calls — not just manuals.</div>
        <button class="btn-primary" onclick="state.step='category'; render();">Start Triage →</button>
      `;
    }

    function renderCategory() {
      return `
        <h2>What type of equipment?</h2>
        <div class="intro" style="margin-bottom:18px;">Select the closest match.</div>
        <div class="grid">
          ${categories.map(cat => `
            <button class="cat-btn" onclick="chooseCategory('${cat.id}')">
              <div class="cat-icon">${cat.icon}</div>
              <div class="cat-label">${cat.label}</div>
            </button>
          `).join("")}
        </div>
      `;
    }

    function renderDescribe() {
      const cat = selectedCategoryObj();
      return `
        ${cat ? `<div class="chip">${cat.icon} ${cat.label}</div>` : ""}
        <h2>What’s happening?</h2>
        <div class="intro" style="margin-bottom:14px;">Error codes, symptoms, when it started — the more detail, the better.</div>
        <textarea id="descriptionBox" placeholder='e.g. "Midmark M11 showing error 980, won’t complete cycle"\n\nor "Compressor runs but pressure won’t build"'>${state.description}</textarea>
        <button class="btn-primary" style="margin-top:14px;" onclick="saveAndRun()">Run Triage →</button>
        <button class="btn-ghost" onclick="state.step='category'; render();">← Change Equipment Type</button>
      `;
    }

    function renderResult() {
      const cat = selectedCategoryObj();
      return `
        <div class="result-box">
          <div style="font-size:30px;flex-shrink:0;">📞</div>
          <div>
            <div class="result-title">North Star should take a look</div>
            <div class="result-text">This may be a simple first-check issue, but based on the symptoms, a technician is likely needed if it does not resolve quickly.</div>
          </div>
        </div>

        <div class="section-label">What’s likely happening</div>
        <div style="font-size:15px;line-height:1.7;margin-bottom:22px;">
          ${cat ? `Based on the ${cat.label.toLowerCase()} symptoms you entered, this sounds like a common operational or connection issue that should be checked safely first.` : `This sounds like a common operational or connection issue that should be checked safely first.`}
        </div>

        <div class="section-label">Safe first checks</div>
        <div class="step"><div class="step-num">1</div><div>Check power, visible connections, and anything obviously loose or disconnected.</div></div>
        <div class="step"><div class="step-num">2</div><div>If there is water involved, confirm the reservoir, line, or drain is not empty, kinked, or blocked.</div></div>
        <div class="step"><div class="step-num">3</div><div>If the issue continues after these checks, stop troubleshooting and call North Star.</div></div>

        <div class="warning">⚠️ Do not open the unit or attempt internal repairs during this demo phase unless your team already knows that step is safe and approved.</div>

        <button class="btn-ghost" onclick="resetApp()">← Triage Another Problem</button>
      `;
    }

    function saveAndRun() {
      const box = document.getElementById("descriptionBox");
      state.description = box ? box.value : "";
      runTriage();
    }

    function render() {
      const app = document.getElementById("app");
      if (!app) return;

      if (state.step === "welcome") app.innerHTML = renderWelcome();
      if (state.step === "category") app.innerHTML = renderCategory();
      if (state.step === "describe") app.innerHTML = renderDescribe();
      if (state.step === "result") app.innerHTML = renderResult();
    }

    render();
  </script>
</body>
</html>
