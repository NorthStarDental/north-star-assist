<!DOCTYPE html>
<html>
<head>
  <title>North Star Dental Assist</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F5F7FA;
    }

    .header {
      background: #17315C;
      text-align: center;
      padding: 30px 20px;
    }

    .header img {
      width: 180px;
      margin-bottom: 10px;
    }

    .card {
      max-width: 550px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .cat-btn {
      background: white;
      border: 2px solid #dde3ef;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
    }

    .cat-btn:hover {
      border-color: #C89B2D;
      background: #fff8eb;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      background: #17315C;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #fff8eb;
      border: 1px solid #C89B2D;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="ChatGPT Image Mar 31, 2026, 06_07_57 PM.png">
</div>

<div class="card">

  <h2>What type of equipment?</h2>

  <div class="grid">
    <div class="cat-btn">⚗️ Autoclave</div>
    <div class="cat-btn">🔧 Compressor</div>
    <div class="cat-btn">💨 Vacuum</div>
    <div class="cat-btn">🦷 Handpiece</div>
    <div class="cat-btn">📡 X-Ray</div>
    <div class="cat-btn">🪑 Chair</div>
  </div>

  <h2>What’s happening?</h2>

  <textarea id="input" placeholder="Describe the issue..."></textarea>

  <button onclick="run()">Run Triage</button>

  <div id="result"></div>

</div>

<script>
function run() {
  const text = document.getElementById("input").value;

  if (!text) return;

  document.getElementById("result").innerHTML =
    '<div class="result"><strong>Result:</strong><br>Check power, water, and connections first. If the issue continues, call North Star.</div>';
}
</script>

</body>
</html>
